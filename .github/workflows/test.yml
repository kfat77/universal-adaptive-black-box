name: Test

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .[excel,dev]
      - run: ruff check src tests
      - run: ruff format --check src tests
      - run: mypy src/adaptive_surrogate
      - run: python -m pytest --cov=adaptive_surrogate --cov-fail-under=85
      - run: python -m build
      - run: python -c "from adaptive_surrogate import AdaptiveBlackBox; print(AdaptiveBlackBox.__name__)"
